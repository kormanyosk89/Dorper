<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery - KrisDorper Genetics</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* UGYANAZ a CSS mint a magyar – nem változtattam */
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f4f4f4;
}

.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 80px;
    background: #f5efe6;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.top-logo { max-height: 90px; }

.lang-switch {
    position: absolute;
    right: 20px;
    display: flex;
    gap: 10px;
}

.lang-switch img {
    height: 30px;
    cursor: pointer;
    opacity: 0.6;
}

.lang-switch .active {
    opacity: 1;
    border-bottom: 2px solid #8b6f47;
}

.menu-btn {
    position: fixed;
    top: 40px;
    left: 20px;
    transform: translateY(-50%);
    font-size: 30px;
    cursor: pointer;
}

.sidebar {
    position: fixed;
    left: -250px;
    width: 250px;
    height: 100%;
    background: #222;
    padding-top: 80px;
    transition: 0.3s;
}

.sidebar a {
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
}

h1 {
    text-align: center;
    margin: 120px 0 20px 0;
    text-transform: uppercase;
}

.story-box {
    max-width: 1200px;
    margin: auto;
    background: #fff;
    padding: 20px 30px;
    border-radius: 10px;
    margin-bottom: 40px;
    text-align: justify;
}

.gallery, .gallery-simple {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    max-width: 1200px;
    margin: auto;
}

.card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.overlay {
    position: absolute;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 10px;
    transform: translateY(100%);
    transition: 0.3s;
}

.card:hover .overlay {
    transform: translateY(0);
}

.gallery-simple img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
}

.lightbox {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}

.whatsapp-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #f5efe6;
    display: flex;
    justify-content: center;
    align-items: center;
}
</style>
</head>

<body>

<div class="topbar">
    <img src="logo.png" class="top-logo">

    <div class="lang-switch">
        <a href="galeria.html"><img src="hu.png"></a>
        <img src="en.png" class="active">
    </div>
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="menu" class="sidebar">
    <a href="index-en.html">Home</a>
    <a href="rolunk-en.html">About</a>
    <a href="galeria-en.html">Gallery</a>
    <a href="kapcsolat-en.html">Contact</a>
</div>

<h1>Animals for Sale</h1>

<div class="story-box">
<p>
The soul of the shepherd lives in the open plains, just like the outlaw who always seeks freedom.
</p>
</div>

<div class="gallery">
    <div class="card">
        <img src="1.jpg" onclick="openImg(this.src)">
        <div class="overlay">Father: 330110<br>Mother: 345611<br>Weight at 3 months: 26 kg</div>
    </div>
</div>

<h1>Our Pride</h1>

<div class="gallery-simple">
    <img src="4.jpg" onclick="openImg(this.src)">
</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
    <img id="lightbox-img">
</div>

<div class="whatsapp-bar">
    <a href="https://wa.me/36305726965">
        <i class="fab fa-whatsapp"></i> Be part of the Dorper story
    </a>
</div>

<script>
function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}
function closeImg(){
document.getElementById("lightbox").style.display="none";
}
function toggleMenu(){
let menu=document.getElementById("menu");
menu.style.left=(menu.style.left==="0px")?"-250px":"0px";
}
</script>

</body>
</html>
